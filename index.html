<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: transparent;
}
  
.container {
  padding: 20px;
  width: 100%;
  max-width: 900px;
  margin: auto;
}

.row {
  margin: 25px 0;
  display: flex;
  align-items: center;
  gap: 20px;
}

.name {
  width: 150px;
  font-size: 30px;
  font-weight: bold;
  color: #ff5a1f;
}

.bar {
  display: flex;
  gap: 8px;
  width: 100%; 
}

.segment {
  width: 100%;
  max-width: 120px;
  height: 30px;
  background: #f3d7bb;
  border-radius: 30px;
  position: relative;  
  overflow: hidden;
}

.segment.active {
  background: #ff5a1f;
}
  .segment.active::after {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent
  );
  transform: skewX(-20deg);
}

.segment.active.shine::after {
  animation: shine 2.0s infinite;
}

@keyframes shine {
  0% {
    left: -100%;
  }
  100% {
    left: 150%;
  }
}
  .row.completed {
  animation: pop 0.6s ease;
}

.row.completed .segment.active {
  box-shadow: 0 0 10px rgba(255, 90, 31, 0.7);
}

.row.completed .segment.active {
  animation: pulse 1.5s infinite;
}
  
.row.completed .segment.active {
  background: #ff4300;
}

/* POP inicial */
@keyframes pop {
  0% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.05);
  }
  100% {
    transform: scale(1);
  }
}

/* PULSO */
@keyframes pulse {
  0% {
    box-shadow: 0 0 5px rgba(255, 90, 31, 0.5);
  }
  50% {
    box-shadow: 0 0 15px rgba(255, 90, 31, 1);
  }
  100% {
    box-shadow: 0 0 5px rgba(255, 90, 31, 0.5);
  }
}
</style>

</head>

<body>
<div class="container" id="widget"></div>

<script>
const MAX = 6;
const container = document.getElementById("widget");
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBPNPGWoHFyEu5pj6-bRARYDhtCgQNv4iDhVWAANZDLQNKgGkFacd4xvBz-qGUbS7kLbAC-w56aM5x/pub?output=csv";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1); // quitar encabezado

    rows.forEach(line => {
      if (!line.trim()) return;

      const [name, value] = line.split(",");

      const row = document.createElement("div");
      row.className = "row";
      const val = parseInt(value);

if (val === MAX) {
  row.classList.add("completed");
}

      const nameEl = document.createElement("span");
      nameEl.className = "name";
      nameEl.textContent = name;

      const bar = document.createElement("div");
      bar.className = "bar";

      for (let i = 0; i < MAX; i++) {
  const segment = document.createElement("div");
  segment.className = "segment";

  bar.appendChild(segment);

  const val = parseInt(value);

  if (i < val) {
    setTimeout(() => {
      segment.classList.add("active");
      segment.classList.add("fill");
      setTimeout(() => {
  segment.classList.add("shine");
}, i * 200);
    }, i * 150);
  } else {
    setTimeout(() => {
      segment.classList.add("fill");
    }, i * 100);
  }
}
  
      row.appendChild(nameEl);
      row.appendChild(bar);
      container.appendChild(row);
    });
  });
</script>

</body>
</html>
