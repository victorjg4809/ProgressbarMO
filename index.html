<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: transparent;
}
  
.container {
  padding: 20px;
  width: 100%;
  max-width: 900px;
  margin: auto;
}

.row {
  margin: 25px 0;
  display: flex;
  align-items: center;
  gap: 20px;
}

.name {
  width: 120px;
  font-size: 20px;
  font-weight: bold;
  color: #ff5a1f;
}

.bar {
  display: flex;
  gap: 8px;
  width: 100%; 
}

.segment {
  width: 100%;
  max-width: 120px;
  height: 30px;
  background: #f3d7bb;
  border-radius: 30px;
  opacity: 0;
  transform: scaleX(0);
  transform-origin: left;
}
.segment.fill {
  opacity: 1;
  transform: scaleX(1);
  transition: transform 0.4s ease, opacity 0.2s ease;
}
.segment.active {
  background: #ff5a1f;
}
</style>

</head>

<body>
<div class="container" id="widget"></div>

<script>
const MAX = 6;
const container = document.getElementById("widget");
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBPNPGWoHFyEu5pj6-bRARYDhtCgQNv4iDhVWAANZDLQNKgGkFacd4xvBz-qGUbS7kLbAC-w56aM5x/pub?output=csv";

fetch(SHEET_URL)
  .then(res => res.text())
  .then(csv => {
    const rows = csv.split("\n").slice(1); // quitar encabezado

    rows.forEach(line => {
      if (!line.trim()) return;

      const [name, value] = line.split(",");

      const row = document.createElement("div");
      row.className = "row";

      const nameEl = document.createElement("span");
      nameEl.className = "name";
      nameEl.textContent = name;

      const bar = document.createElement("div");
      bar.className = "bar";

      for (let i = 0; i < MAX; i++) {
      const segment = document.createElement("div");
      segment.className = "segment";

      bar.appendChild(segment);

      if (i < value) {
    // animación con delay progresivo
        setTimeout(() => {
          segment.classList.add("active");
          segment.classList.add("fill");
      }, i * 150); // 👈 velocidad de animación
    } else {
    // los vacíos también aparecen suavemente
    setTimeout(() => {
      segment.classList.add("fill");
    }, i * 100);
  }
}

        bar.appendChild(segment);
      }

      row.appendChild(nameEl);
      row.appendChild(bar);
      container.appendChild(row);
    });
  });
</script>

</body>
</html>
